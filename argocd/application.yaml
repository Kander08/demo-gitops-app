apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-flask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kander08/demo-gitops-app.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true